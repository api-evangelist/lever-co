notes:
  - The Lever Data API and Postings API are bundled with the platform subscription; there is no per-call charge.
    Capacity is governed by rate limits rather than billing meters.
  - Lever is owned by Employ Inc., which also bills JazzHR and Jobvite under the same publisher; allocation may
    cross product lines in FOCUS exports.
  - Multi-year and tiered seat pricing are common — surface effective per-seat cost as a derived metric.
