naftiko: 1.0.0-alpha2
info:
  label: Lever Data API — Files
  description: 'Lever Data API — Files. List, upload, retrieve, and delete resume and attachment files.'
  tags:
  - Lever
  - Files
  - Resumes
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LEVER_API_KEY: LEVER_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-files
    baseUri: https://api.lever.co/v1
    description: Lever Data API — Files.
    resources:
    - name: files
      path: /files
      operations:
      - name: listFiles
        method: GET
        description: List Files
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: uploadFile
        method: POST
        description: Upload A File
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: file
      path: /files/{id}
      operations:
      - name: getFile
        method: GET
        description: Retrieve A File
        outputRawFormat: json
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteFile
        method: DELETE
        description: Delete A File
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: basic
      username: '{{env.LEVER_API_KEY}}'
      password: ''
  exposes:
  - type: mcp
    namespace: data-files-mcp
    port: 9090
    transport: http
    description: MCP adapter for Lever Files.
    tools:
    - name: lever-list-files
      description: List Files
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-files.listFiles
      outputParameters:
      - type: object
        mapping: $.
    - name: lever-get-file
      description: Retrieve A File
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-files.getFile
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: lever-delete-file
      description: Delete A File
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: data-files.deleteFile
      with:
        id: tools.id
