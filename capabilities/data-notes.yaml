naftiko: 1.0.0-alpha2
info:
  label: Lever Data API — Notes
  description: 'Lever Data API — Notes. Read and write free-form notes on opportunities.'
  tags:
  - Lever
  - Notes
  - Collaboration
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LEVER_API_KEY: LEVER_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-notes
    baseUri: https://api.lever.co/v1
    description: Lever Data API — Notes.
    resources:
    - name: notes
      path: /opportunities/{opportunityId}/notes
      operations:
      - name: listNotes
        method: GET
        description: List Notes
        outputRawFormat: json
        inputParameters:
        - name: opportunityId
          in: path
          type: string
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createNote
        method: POST
        description: Create A Note
        outputRawFormat: json
        inputParameters:
        - name: opportunityId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.LEVER_API_KEY}}'
      password: ''
  exposes:
  - type: mcp
    namespace: data-notes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Lever Notes.
    tools:
    - name: lever-list-notes
      description: List Notes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-notes.listNotes
      with:
        opportunityId: tools.opportunityId
      outputParameters:
      - type: object
        mapping: $.
    - name: lever-create-note
      description: Create A Note
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: data-notes.createNote
      with:
        opportunityId: tools.opportunityId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
