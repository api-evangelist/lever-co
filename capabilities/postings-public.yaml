naftiko: 1.0.0-alpha2
info:
  label: Lever Postings API — Public
  description: 'Lever Postings API — Public. List published postings, retrieve a single posting, and submit applications
    against a company''s public Lever site.'
  tags:
  - Lever
  - Postings
  - Public
  - Applications
  - Job Sites
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LEVER_SITE: LEVER_SITE
    LEVER_POSTING_FORM_KEY: LEVER_POSTING_FORM_KEY
capability:
  consumes:
  - type: http
    namespace: postings-public
    baseUri: https://api.lever.co/v0/postings
    description: Lever public Postings API.
    resources:
    - name: site-postings
      path: /{site}
      operations:
      - name: listPublicPostings
        method: GET
        description: List Public Postings
        outputRawFormat: json
        inputParameters:
        - name: site
          in: path
          type: string
          required: true
        - name: mode
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: skip
          in: query
          type: integer
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: posting
      path: /{site}/{postingId}
      operations:
      - name: getPublicPosting
        method: GET
        description: Retrieve A Public Posting
        outputRawFormat: json
        inputParameters:
        - name: site
          in: path
          type: string
          required: true
        - name: postingId
          in: path
          type: string
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: submitApplication
        method: POST
        description: Submit An Application
        outputRawFormat: json
        inputParameters:
        - name: site
          in: path
          type: string
          required: true
        - name: postingId
          in: path
          type: string
          required: true
        - name: key
          in: query
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: none
  exposes:
  - type: mcp
    namespace: postings-public-mcp
    port: 9090
    transport: http
    description: MCP adapter for Lever public Postings.
    tools:
    - name: lever-list-public-postings
      description: List Public Postings for a Lever site.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: postings-public.listPublicPostings
      with:
        site: tools.site
      outputParameters:
      - type: object
        mapping: $.
    - name: lever-get-public-posting
      description: Retrieve A Public Posting
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: postings-public.getPublicPosting
      with:
        site: tools.site
        postingId: tools.postingId
      outputParameters:
      - type: object
        mapping: $.
    - name: lever-submit-application
      description: Submit An Application
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: postings-public.submitApplication
      with:
        site: tools.site
        postingId: tools.postingId
        key: tools.key
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
