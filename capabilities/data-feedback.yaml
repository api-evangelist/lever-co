naftiko: 1.0.0-alpha2
info:
  label: Lever Data API — Feedback
  description: 'Lever Data API — Feedback. Capture and read structured interviewer feedback on opportunities.'
  tags:
  - Lever
  - Feedback
  - Interviews
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LEVER_API_KEY: LEVER_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-feedback
    baseUri: https://api.lever.co/v1
    description: Lever Data API — Feedback.
    resources:
    - name: feedback
      path: /opportunities/{opportunityId}/feedback
      operations:
      - name: listFeedback
        method: GET
        description: List Feedback
        outputRawFormat: json
        inputParameters:
        - name: opportunityId
          in: path
          type: string
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createFeedback
        method: POST
        description: Create Feedback
        outputRawFormat: json
        inputParameters:
        - name: opportunityId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.LEVER_API_KEY}}'
      password: ''
  exposes:
  - type: mcp
    namespace: data-feedback-mcp
    port: 9090
    transport: http
    description: MCP adapter for Lever Feedback.
    tools:
    - name: lever-list-feedback
      description: List Feedback
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-feedback.listFeedback
      with:
        opportunityId: tools.opportunityId
      outputParameters:
      - type: object
        mapping: $.
    - name: lever-create-feedback
      description: Create Feedback
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: data-feedback.createFeedback
      with:
        opportunityId: tools.opportunityId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
