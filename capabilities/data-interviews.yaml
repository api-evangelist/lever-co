naftiko: 1.0.0-alpha2
info:
  label: Lever Data API — Interviews
  description: 'Lever Data API — Interviews. List, create, update, and delete interviews scoped to an opportunity.'
  tags:
  - Lever
  - Interviews
  - Scheduling
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LEVER_API_KEY: LEVER_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-interviews
    baseUri: https://api.lever.co/v1
    description: Lever Data API — Interviews.
    resources:
    - name: interviews
      path: /opportunities/{opportunityId}/interviews
      operations:
      - name: listInterviews
        method: GET
        description: List Interviews
        outputRawFormat: json
        inputParameters:
        - name: opportunityId
          in: path
          type: string
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createInterview
        method: POST
        description: Create An Interview
        outputRawFormat: json
        inputParameters:
        - name: opportunityId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: interview
      path: /opportunities/{opportunityId}/interviews/{id}
      operations:
      - name: updateInterview
        method: PUT
        description: Update An Interview
        outputRawFormat: json
        inputParameters:
        - name: opportunityId
          in: path
          type: string
          required: true
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteInterview
        method: DELETE
        description: Delete An Interview
        inputParameters:
        - name: opportunityId
          in: path
          type: string
          required: true
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: basic
      username: '{{env.LEVER_API_KEY}}'
      password: ''
  exposes:
  - type: mcp
    namespace: data-interviews-mcp
    port: 9090
    transport: http
    description: MCP adapter for Lever Interviews.
    tools:
    - name: lever-list-interviews
      description: List Interviews
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-interviews.listInterviews
      with:
        opportunityId: tools.opportunityId
      outputParameters:
      - type: object
        mapping: $.
    - name: lever-create-interview
      description: Create An Interview
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: data-interviews.createInterview
      with:
        opportunityId: tools.opportunityId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: lever-update-interview
      description: Update An Interview
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: data-interviews.updateInterview
      with:
        opportunityId: tools.opportunityId
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: lever-delete-interview
      description: Delete An Interview
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: data-interviews.deleteInterview
      with:
        opportunityId: tools.opportunityId
        id: tools.id
