naftiko: 1.0.0-alpha2
info:
  label: Lever Data API — Opportunities
  description: 'Lever Data API — Opportunities. 4 operations: list, create, retrieve, update. Self-contained Naftiko
    capability for managing candidate opportunities (the unified candidate-at-posting record).'
  tags:
  - Lever
  - Opportunities
  - Candidates
  - ATS
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LEVER_API_KEY: LEVER_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-opportunities
    baseUri: https://api.lever.co/v1
    description: Lever Data API — Opportunities business capability.
    resources:
    - name: opportunities
      path: /opportunities
      operations:
      - name: listOpportunities
        method: GET
        description: List Opportunities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createOpportunity
        method: POST
        description: Create An Opportunity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: opportunity
      path: /opportunities/{id}
      operations:
      - name: getOpportunity
        method: GET
        description: Retrieve An Opportunity
        outputRawFormat: json
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateOpportunity
        method: PUT
        description: Update An Opportunity
        outputRawFormat: json
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.LEVER_API_KEY}}'
      password: ''
  exposes:
  - type: rest
    namespace: data-opportunities-rest
    port: 8080
    description: REST adapter for Lever Opportunities.
    resources:
    - path: /v1/opportunities
      name: opportunities
      operations:
      - method: GET
        name: listOpportunities
        call: data-opportunities.listOpportunities
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createOpportunity
        call: data-opportunities.createOpportunity
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/opportunities/{id}
      name: opportunity
      operations:
      - method: GET
        name: getOpportunity
        call: data-opportunities.getOpportunity
        with:
          id: rest.path.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateOpportunity
        call: data-opportunities.updateOpportunity
        with:
          id: rest.path.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-opportunities-mcp
    port: 9090
    transport: http
    description: MCP adapter for Lever Opportunities.
    tools:
    - name: lever-list-opportunities
      description: List Opportunities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-opportunities.listOpportunities
      outputParameters:
      - type: object
        mapping: $.
    - name: lever-create-opportunity
      description: Create An Opportunity
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: data-opportunities.createOpportunity
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: lever-get-opportunity
      description: Retrieve An Opportunity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-opportunities.getOpportunity
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: lever-update-opportunity
      description: Update An Opportunity
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: data-opportunities.updateOpportunity
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
