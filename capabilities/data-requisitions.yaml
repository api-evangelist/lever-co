naftiko: 1.0.0-alpha2
info:
  label: Lever Data API — Requisitions
  description: 'Lever Data API — Requisitions. Manage headcount-tracking requisitions that back postings.'
  tags:
  - Lever
  - Requisitions
  - Headcount
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LEVER_API_KEY: LEVER_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-requisitions
    baseUri: https://api.lever.co/v1
    description: Lever Data API — Requisitions.
    resources:
    - name: requisitions
      path: /requisitions
      operations:
      - name: listRequisitions
        method: GET
        description: List Requisitions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createRequisition
        method: POST
        description: Create A Requisition
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: requisition
      path: /requisitions/{id}
      operations:
      - name: updateRequisition
        method: PUT
        description: Update A Requisition
        outputRawFormat: json
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteRequisition
        method: DELETE
        description: Delete A Requisition
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
    authentication:
      type: basic
      username: '{{env.LEVER_API_KEY}}'
      password: ''
  exposes:
  - type: mcp
    namespace: data-requisitions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Lever Requisitions.
    tools:
    - name: lever-list-requisitions
      description: List Requisitions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-requisitions.listRequisitions
      outputParameters:
      - type: object
        mapping: $.
    - name: lever-create-requisition
      description: Create A Requisition
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: data-requisitions.createRequisition
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: lever-update-requisition
      description: Update A Requisition
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: data-requisitions.updateRequisition
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: lever-delete-requisition
      description: Delete A Requisition
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: data-requisitions.deleteRequisition
      with:
        id: tools.id
