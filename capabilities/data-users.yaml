naftiko: 1.0.0-alpha2
info:
  label: Lever Data API — Users
  description: 'Lever Data API — Users. Manage Lever users (recruiters, hiring managers, interviewers).'
  tags:
  - Lever
  - Users
  - Identity
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LEVER_API_KEY: LEVER_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-users
    baseUri: https://api.lever.co/v1
    description: Lever Data API — Users.
    resources:
    - name: users
      path: /users
      operations:
      - name: listUsers
        method: GET
        description: List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createUser
        method: POST
        description: Create A User
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: user
      path: /users/{id}
      operations:
      - name: getUser
        method: GET
        description: Retrieve A User
        outputRawFormat: json
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateUser
        method: PUT
        description: Update A User
        outputRawFormat: json
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.LEVER_API_KEY}}'
      password: ''
  exposes:
  - type: mcp
    namespace: data-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Lever Users.
    tools:
    - name: lever-list-users
      description: List Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-users.listUsers
      outputParameters:
      - type: object
        mapping: $.
    - name: lever-create-user
      description: Create A User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: data-users.createUser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: lever-get-user
      description: Retrieve A User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-users.getUser
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: lever-update-user
      description: Update A User
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: data-users.updateUser
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
